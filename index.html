<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Аптека - Главная</title>
    
    <link rel="stylesheet" href="css/libs/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <span class="navbar-brand">Аптека</span>
            <div>
                <a href="index.html" class="text-white me-2">Главная</a>
                <a href="about.html" class="text-white">Контакты</a>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <h1 class="mb-4">Наши товары</h1>
        
        <div class="row">
            <div class="col-md-4 mb-3">
                <div class="card">
				<img src="images/1.jpg" class="card-img-top" alt="Парацетамол" style="height: 200px; object-fit: cover;">
                    <div class="card-body">
                        <h5 class="card-title">Парацетамол</h5>
                        <p class="card-text">Таблетки 500 мг</p>
                        <p class="text-primary fw-bold">150 ₽</p>
                        <button class="btn btn-primary add-to-cart" data-product="Парацетамол">В корзину</button>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4 mb-3">
                <div class="card">
				<img src="images/2.jpg" class="card-img-top" alt="Витамин С" style="height: 200px; object-fit: cover;">
                    <div class="card-body">
                        <h5 class="card-title">Витамин С</h5>
                        <p class="card-text">Шипучие таблетки</p>
                        <p class="text-primary fw-bold">250 ₽</p>
                        <button class="btn btn-primary add-to-cart" data-product="Витамин С">В корзину</button>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4 mb-3">
                <div class="card">
				            <img src="images/3.jpg" class="card-img-top" alt="Ибупрофен" style="height: 200px; object-fit: cover;">
                    <div class="card-body">
                        <h5 class="card-title">Ибупрофен</h5>
                        <p class="card-text">Капсулы 200 мг</p>
                        <p class="text-primary fw-bold">180 ₽</p>
                        <button class="btn btn-primary add-to-cart" data-product="Ибупрофен">В корзину</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="cartMessage" class="mt-3 alert" style="display: none;"></div>
    </div>

    <footer class="bg-light text-center py-3">
        <p>Аптека 2026</p>
    </footer>

    <script src="js/jquery.min.js"></script>
    <script src="js/libs/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
